<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="panel">
      <div id="titlebar">
        <span>AI Usage Tracker</span>
        <div id="titlebar-actions">
          <span id="settings-btn" title="Settings">&#9881;</span>
          <button id="compact-btn" title="Compact view">&#9652;</button>
          <button id="hide-btn" title="Hide">_</button>
        </div>
      </div>
      <div id="settings" class="hidden">
        <div class="settings-row">
          <label for="opacity-slider">Opacity</label>
          <input type="range" id="opacity-slider" min="0.1" max="1" step="0.05" />
        </div>
        <div class="settings-row">
          <label for="poll-interval-input">Poll interval (ms)</label>
          <input type="number" id="poll-interval-input" min="200" step="100" />
        </div>
        <div id="provider-toggles"></div>
        <div class="settings-row">
          <label for="theme-select">Theme</label>
          <select id="theme-select">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </div>
        <div class="settings-row">
          <label for="accent-input">Accent color</label>
          <input type="color" id="accent-input" />
        </div>
      </div>
      <div id="usage-limits"></div>
      <div id="history-section">
        <div id="history-label">
          <span>Tokens</span>
          <span id="history-value">&mdash;</span>
        </div>
        <canvas id="history-chart" height="28"></canvas>
        <div id="history-axis">
          <span>6h ago</span>
          <span>3h ago</span>
          <span>now</span>
        </div>
      </div>
      <div id="content"><div class="empty">Loading...</div></div>
    </div>
    <script src="/main.js"></script>
  </body>
</html>
